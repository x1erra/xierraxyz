version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ourtube-backend
    volumes:
      - ./downloads:/app/downloads
    ports:
      - "8000:8000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ourtube-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  downloads:
